<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLESHNEVAR • Креветки та раки у бульйоні</title>
    <meta name="description" content="Авторські креветки та раки у бульйонах з вогняними смаками • Доставка Кам'янське">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --fire: #ff4d00;
            --dark: #0a0a0a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0a0a url('https://i.imgur.com/dvT9R.jpg') center/cover fixed; /* вогняний фон з рамкою полум'я */
            color: #eee;
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        /* Додатковий вогняний ефект зверху */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; height: 180px;
            background: linear-gradient(to bottom, rgba(255, 77, 0, 0.25), transparent);
            z-index: -1;
            pointer-events: none;
        }

        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 2px solid var(--fire);
        }
        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-family: 'Impact', sans-serif;
            font-size: 2.1rem;
            font-weight: 900;
            color: white;
            text-shadow: 
                0 0 10px #ff4d00,
                0 0 20px #ff4d00,
                2px 2px 0 #000,
                -2px -2px 0 #000;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo span {
            color: #ff8c00;
        }

        .cart-btn {
            background: transparent;
            border: 2px solid var(--fire);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .cart-btn:hover {
            background: var(--fire);
            transform: scale(1.08);
        }

        .hero {
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), url('https://i.imgur.com/WR6sF.jpg') center/cover no-repeat;
            display: flex;
            align-items: center;
            text-align: center;
            position: relative;
        }
        .hero-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
            z-index: 2;
        }
        .hero h1 {
            font-size: 4rem;
            color: white;
            text-shadow: 0 0 40px var(--fire);
            margin-bottom: 20px;
            line-height: 1.1;
        }
        .hero p {
            font-size: 1.5rem;
            max-width: 700px;
            margin: 0 auto 40px;
            color: #ddd;
        }

        .btn {
            padding: 18px 45px;
            font-size: 1.4rem;
            font-weight: 700;
            border-radius: 50px;
            background: linear-gradient(45deg, #ff4d00, #ff8c00);
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(255, 77, 0, 0.5);
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(255, 77, 0, 0.7);
        }

        section {
            padding: 90px 20px;
            max-width: 1280px;
            margin: 0 auto;
        }
        .section-title {
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 60px;
            color: #ff8c00;
            text-shadow: 0 0 25px var(--fire);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }
        .product-card {
            background: rgba(20, 20, 20, 0.95);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s;
            border: 1px solid #333;
        }
        .product-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 25px 50px rgba(255, 77, 0, 0.35);
        }
        .product-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
        }
        .product-info {
            padding: 22px;
        }
        .product-info h3 {
            color: white;
            margin-bottom: 10px;
            font-size: 1.35rem;
        }
        .price {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--fire);
            margin: 15px 0;
        }
        .add-to-cart {
            width: 100%;
            background: var(--fire);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1.05rem;
        }

        /* Корзина, форма, toast — ті ж самі, що були раніше */

        .share-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--fire);
            color: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 15px 35px rgba(255, 77, 0, 0.6);
            z-index: 9999;
            cursor: pointer;
        }

        footer {
            background: #0a0a0a;
            padding: 50px 20px;
            text-align: center;
            color: #777;
            border-top: 1px solid #222;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

    <!-- HEADER з логотипом як на твоїх меню -->
    <header>
        <div class="header-inner">
            <div class="logo">
                KLESHNEVAR
            </div>
            
            <button class="cart-btn" onclick="toggleCart()">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count">0</span>
            </button>
        </div>
    </header>

    <!-- HERO з вогняним фоном -->
    <section class="hero">
        <div class="hero-content">
            <h1>КРЕВЕТКИ ТА РАКИ<br>У БУЛЬЙОНІ</h1>
            <p>Вогняні авторські смаки • Свіжі морепродукти • Доставка Кам'янське та область</p>
            <a href="#menu" class="btn">
                <i class="fas fa-fire"></i> Переглянути меню
            </a>
        </div>
    </section>

    <!-- Тут продовжується решта сайту (меню, товари, корзина, форма) з попередньої версії -->

    <!-- Для зручності встав сюди весь блок з товарами, корзиною та формою з попереднього коду, який я тобі надсилав. -->

    <section id="menu">
        <h2 class="section-title">МЕНЮ</h2>
        <div class="products-grid" id="products-grid">
            <!-- товари рендеряться через JS -->
        </div>
    </section>

    <!-- Кнопка поділитися -->
    <div class="share-btn" onclick="shareSite()">
        <i class="fas fa-share-alt"></i>
    </div>

    <footer>
        <p>KLESHNEVAR © 2026 • Кам'янське • Вогонь у кожній порції 🔥</p>
    </footer>

    <script>
        // Встав сюди весь JavaScript з попередньої версії (renderProducts, cart, addToCart, sendToTelegram тощо)
        // Якщо потрібно — скажи, я надішлю повний файл одним шматком.
    </script>
</body>
</html>
