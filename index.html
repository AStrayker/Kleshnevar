<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLESHNEVAR • Раки та креветки у бульйоні</title>
    <link rel="icon" href="https://i.imgur.com/SA91b.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --fire: #ff1a1a;     /* Насичений червоний */
            --dark: #0a0a0a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0a0a url('https://i.imgur.com/ykRTF.jpg') center/cover fixed;
            color: #eee;
            min-height: 100vh;
            position: relative;
        }
        
        /* Ефект полум'я по краях екрану */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(transparent, rgba(255, 26, 26, 0.15), transparent),
                        radial-gradient(circle at 20% 30%, rgba(255, 26, 26, 0.25), transparent 70%);
            pointer-events: none;
            z-index: -1;
            animation: flame 12s infinite alternate;
        }
        @keyframes flame { 0% { opacity: 0.7; } 100% { opacity: 1; } }

        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(10,10,10,0.96);
            backdrop-filter: blur(12px);
            z-index: 1000;
            border-bottom: 4px solid var(--fire);
        }
        .header-inner {
            max-width: 1300px;
            margin: 0 auto;
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-img {
            height: 72px;
            filter: drop-shadow(0 0 20px var(--fire));
        }

        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding-top: 80px;
        }
        .hero-content h1 {
            font-size: 6.5rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 90px var(--fire), 8px 8px 0 #000;
            margin-bottom: 20px;
        }

        .phone {
            font-size: 3.4rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 40px var(--fire);
            margin: 30px 0;
        }

        .btn {
            padding: 18px 55px;
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--fire), #c00);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 15px 45px rgba(255, 26, 26, 0.7);
            transition: all 0.3s;
        }
        .btn:hover { transform: scale(1.08); }

        section { padding: 100px 20px; max-width: 1300px; margin: 0 auto; }
        .section-title {
            text-align: center;
            font-size: 3.6rem;
            color: var(--fire);
            text-shadow: 0 0 50px var(--fire);
            margin-bottom: 70px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 30px;
        }
        .product-card {
            background: rgba(20,20,20,0.97);
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid #333;
            transition: all 0.4s;
        }
        .product-card:hover {
            transform: translateY(-15px);
            border-color: var(--fire);
            box-shadow: 0 25px 60px rgba(255,26,26,0.4);
        }
        .product-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }
        .product-info {
            padding: 22px;
            text-align: center;
        }
        .product-info h3 {
            font-size: 1.35rem;
            margin-bottom: 10px;
        }
        .price {
            font-size: 2rem;
            font-weight: 700;
            color: var(--fire);
            margin: 12px 0;
        }
        .quantity {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 15px 0;
        }
        .quantity button {
            width: 40px;
            height: 40px;
            background: #222;
            color: white;
            border: 2px solid var(--fire);
            border-radius: 50%;
            font-size: 1.4rem;
            cursor: pointer;
        }
        .add-to-cart {
            width: 100%;
            padding: 16px;
            background: var(--fire);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <img src="SA91b.png" alt="KLESHNEVAR" class="logo-img">
            <button onclick="toggleCart()" class="btn" style="font-size:1.2rem; padding:12px 28px;">
                <i class="fas fa-shopping-cart"></i> Корзина (<span id="cart-count">0</span>)
            </button>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>KLESHNEVAR</h1>
            <p>Раки та креветки у вогняному бульйоні</p>
            <div class="phone">096 044 47 65</div>
            <button onclick="document.getElementById('menu').scrollIntoView({behavior:'smooth'})" class="btn">
                <i class="fas fa-fire"></i> Переглянути меню
            </button>
        </div>
    </section>

    <section id="menu">
        <h2 class="section-title">МЕНЮ</h2>
        <div class="products-grid" id="products-grid"></div>
    </section>

    <!-- Корзина (скорочена версія) -->
    <div class="cart-modal" id="cart-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:2000;align-items:center;justify-content:center;">
        <div style="background:#1a1a1a;width:90%;max-width:600px;border-radius:24px;max-height:90vh;overflow:auto;">
            <div style="padding:25px;border-bottom:2px solid #333;display:flex;justify-content:space-between;">
                <h2>Корзина</h2>
                <i class="fas fa-times fa-2x" onclick="toggleCart()" style="cursor:pointer;"></i>
            </div>
            <div id="cart-items" style="padding:20px;"></div>
            <div style="padding:20px;text-align:right;font-size:1.8rem;font-weight:700;">
                Разом: <span id="cart-total">0</span> грн
            </div>
            <div style="padding:0 25px 35px;">
                <button onclick="openOrderForm()" class="btn" style="width:100%;">Оформити замовлення 🔥</button>
            </div>
        </div>
    </div>

    <!-- Форма замовлення -->
    <div class="order-form" id="order-form" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:3000;align-items:center;justify-content:center;">
        <div style="background:#1a1a1a;width:90%;max-width:520px;border-radius:24px;padding:35px;">
            <h2 style="text-align:center;color:var(--fire);">Оформлення замовлення</h2>
            <form onsubmit="sendToTelegram(event)">
                <input type="text" id="name" placeholder="Ім'я" required style="width:100%;padding:16px;margin:15px 0;background:#222;border:none;border-radius:14px;color:white;">
                <input type="tel" id="phone" placeholder="Телефон" required style="width:100%;padding:16px;margin:15px 0;background:#222;border:none;border-radius:14px;color:white;">
                <input type="text" id="address" placeholder="Адреса або самовивіз" style="width:100%;padding:16px;margin:15px 0;background:#222;border:none;border-radius:14px;color:white;">
                <div id="form-total" style="text-align:center;font-size:1.8rem;font-weight:700;margin:30px 0;color:var(--fire);">Сума: 0 грн</div>
                <button type="submit" class="btn" style="width:100%;">Відправити замовлення</button>
                <button type="button" onclick="closeOrderForm()" style="width:100%;margin-top:15px;padding:16px;background:transparent;border:2px solid #555;color:#ccc;border-radius:50px;">Закрити</button>
            </form>
        </div>
    </div>

    <div class="share-btn" onclick="shareSite()" style="position:fixed;bottom:35px;right:35px;width:72px;height:72px;background:var(--fire);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;box-shadow:0 20px 50px rgba(255,26,26,0.7);z-index:9999;cursor:pointer;">
        <i class="fas fa-share-alt"></i>
    </div>

    <footer style="background:#0a0a0a;padding:60px 20px;text-align:center;color:#888;border-top:3px solid #222;">
        <p style="font-size:1.8rem;margin-bottom:10px;">KLESHNEVAR</p>
        <p>Тел: <strong>096 044 47 65</strong></p>
    </footer>

    <script>
        const products = [
            {id:1, name:"Раки у класичному бульйоні", price:1500, desc:"Ароматний бульйон із великою кількістю кропу, часнику та запашних спецій.", img:"https://i.imgur.com/ykRTF.jpg"},
            {id:2, name:"Раки у вершковому бульйоні", price:1500, desc:"Ніжний вершковий смак із часником та спеціями, м’який та насичений аромат.", img:"https://i.imgur.com/ykRTF.jpg"},
            {id:3, name:"Раки у томатному бульйоні", price:1500, desc:"Яскравий томатний бульйон із пікантними спеціями та легкою кислинкою.", img:"https://i.imgur.com/ykRTF.jpg"},
            {id:4, name:"Раки у Том Ям", price:1500, desc:"Пряний тайський бульйон із цитрусовими нотами та гостринкою.", img:"https://i.imgur.com/ykRTF.jpg"},
            {id:5, name:"Раки у пиві", price:1500, desc:"Ароматний бульйон на основі світлого пива зі спеціями та кропом.", img:"https://i.imgur.com/ykRTF.jpg"},
            {id:6, name:"Раки HOT (гострі)", price:1500, desc:"Гострий бульйон із пікантними спеціями для справжніх любителів вогняного смаку 🌶", img:"https://i.imgur.com/ykRTF.jpg"},
            {id:7, name:"Раки у BBQ бульйоні", price:1500, desc:"Насичений бульйон із солодко-димними нотами BBQ та ароматними спеціями.", img:"https://i.imgur.com/ykRTF.jpg"},
            {id:8, name:"Креветки в Том Ям", price:850, desc:"Кисло-гострий тайський бульйон із яскравими пряними нотами.", img:"https://i.imgur.com/ykRTF.jpg"},
            {id:9, name:"Креветки в Том Кха", price:810, desc:"Ніжний кокосовий бульйон із м’яким вершковим смаком.", img:"https://i.imgur.com/ykRTF.jpg"},
            {id:10, name:"Креветки у вершковому бульйоні", price:800, desc:"Кремовий бульйон із ніжним та делікатним смаком.", img:"https://i.imgur.com/ykRTF.jpg"},
            {id:11, name:"Креветки у класичному бульйоні", price:700, desc:"Легкий прозорий бульйон, що підкреслює натуральний смак креветок.", img:"https://i.imgur.com/ykRTF.jpg"},
            {id:12, name:"Креветки у томатному бульйоні", price:800, desc:"Насичений томатний бульйон із легкою кислинкою.", img:"https://i.imgur.com/ykRTF.jpg"},
            {id:13, name:"Креветки у часниково-гострому бульйоні", price:750, desc:"Пікантний бульйон із яскравими нотами часнику.", img:"https://i.imgur.com/ykRTF.jpg"},
            {id:14, name:"Креветки у винному бульйоні", price:770, desc:"Ароматний бульйон із витонченими винними нотами.", img:"https://i.imgur.com/ykRTF.jpg"},
            {id:15, name:"Креветки в апельсиново-імбирному бульйоні", price:750, desc:"Цитрусовий бульйон із легкою імбирною пікантністю.", img:"https://i.imgur.com/ykRTF.jpg"}
        ];

        let cart = [];

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${p.img}" alt="${p.name}">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p>${p.desc}</p>
                        <div class="price">${p.price} грн / 1 кг</div>
                        <div class="quantity">
                            <button onclick="changeQty(this, -1)">–</button>
                            <span class="qty" style="font-size:1.4rem;font-weight:600;width:40px;text-align:center;">1</span>
                            <button onclick="changeQty(this, 1)">+</button>
                        </div>
                        <button class="add-to-cart" onclick="addToCart(this)">Додати в корзину</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function changeQty(btn, delta) {
            const qtySpan = btn.parentElement.querySelector('.qty');
            let qty = parseInt(qtySpan.textContent);
            qty = Math.max(1, qty + delta);
            qtySpan.textContent = qty;
        }

        function addToCart(btn) {
            const card = btn.closest('.product-card');
            const name = card.querySelector('h3').textContent;
            const price = parseInt(card.querySelector('.price').textContent);
            const qty = parseInt(card.querySelector('.qty').textContent);
            
            const existing = cart.find(item => item.name === name);
            if (existing) existing.qty += qty;
            else cart.push({name, price, qty});
            
            updateCartCount();
            showToast(`${name} (${qty} кг) додано 🔥`);
        }

        function updateCartCount() {
            const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cart-count').textContent = totalItems;
        }

        function toggleCart() {
            alert("Корзина відкрита (повний код можна додати за потребою)");
        }

        function showToast(text) {
            const t = document.createElement('div');
            t.style.cssText = `position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:var(--fire); color:white; padding:16px 32px; border-radius:50px; z-index:99999; font-weight:600;`;
            t.textContent = text;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2800);
        }

        function shareSite() {
            navigator.clipboard.writeText(location.href).then(() => alert('Посилання скопійовано!'));
        }

        window.onload = () => {
            renderProducts();
        };
    </script>
</body>
</html>
