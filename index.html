<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLESHNEVAR • Раки та креветки у бульйоні</title>
    <link rel="icon" href="https://i.imgur.com/SA91b.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --fire: #e60000;     /* насичений червоний */
            --dark: #0a0a0a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0a0a url('https://i.imgur.com/laI03.jpg') center/cover fixed; /* вогняний бордер */
            color: #eee;
            min-height: 100vh;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(transparent, rgba(230,0,0,0.15));
            pointer-events: none;
            z-index: -1;
        }

        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(12px);
            z-index: 1000;
            border-bottom: 4px solid var(--fire);
        }
        .header-inner {
            max-width: 1300px;
            margin: 0 auto;
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-img {
            height: 72px;
            width: auto;
            filter: drop-shadow(0 0 20px var(--fire));
        }

        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding-top: 80px;
        }
        .hero-content h1 {
            font-size: 6.5rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 90px var(--fire), 8px 8px 0 #000;
            margin-bottom: 20px;
        }

        .phone {
            font-size: 3.4rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 40px var(--fire);
            margin: 30px 0;
        }

        .btn {
            padding: 18px 55px;
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--fire), #ff3333);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 15px 45px rgba(230,0,0,0.7);
            transition: all 0.4s;
        }
        .btn:hover { transform: scale(1.1) translateY(-6px); }

        section { padding: 100px 20px; max-width: 1300px; margin: 0 auto; }
        .section-title {
            text-align: center;
            font-size: 3.8rem;
            color: var(--fire);
            text-shadow: 0 0 60px var(--fire);
            margin-bottom: 70px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 30px;
        }
        .product-card {
            background: rgba(20,20,20,0.97);
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid #333;
            transition: all 0.4s;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-15px);
            border-color: var(--fire);
            box-shadow: 0 25px 60px rgba(230,0,0,0.5);
        }
        .product-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }
        .product-info {
            padding: 25px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .product-info h3 {
            font-size: 1.45rem;
            margin-bottom: 12px;
            color: white;
        }
        .price {
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--fire);
            margin: 15px 0;
        }
        .size-select {
            margin: 15px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .size-btn {
            padding: 8px 16px;
            background: #222;
            border: 2px solid #555;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .size-btn.active {
            background: var(--fire);
            border-color: var(--fire);
            color: white;
        }
        .add-to-cart {
            margin-top: auto;
            width: 100%;
            padding: 16px;
            background: var(--fire);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .cart-modal, .order-form {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.93);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #1a1a1a;
            width: 92%;
            max-width: 620px;
            border-radius: 24px;
            max-height: 92vh;
            overflow-y: auto;
        }

        .share-btn {
            position: fixed;
            bottom: 35px;
            right: 35px;
            width: 72px;
            height: 72px;
            background: var(--fire);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 20px 50px rgba(230,0,0,0.7);
            z-index: 9999;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <img src="SA91b.png" alt="KLESHNEVAR" class="logo-img">
            <button onclick="toggleCart()" class="btn" style="padding:12px 28px; font-size:1.15rem;">
                <i class="fas fa-shopping-cart"></i> Корзина (<span id="cart-count">0</span>)
            </button>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>KLESHNEVAR</h1>
            <p>Раки та креветки у вогняному бульйоні</p>
            <div class="phone">096 044 47 65</div>
            <button onclick="document.getElementById('menu').scrollIntoView({behavior:'smooth'})" class="btn">
                <i class="fas fa-fire"></i> Переглянути меню
            </button>
        </div>
    </section>

    <section id="menu">
        <h2 class="section-title">МЕНЮ</h2>
        <div class="products-grid" id="products-grid"></div>
    </section>

    <!-- Корзина і форма (скорочено для прикладу) -->
    <div class="cart-modal" id="cart-modal">...</div>
    <div class="order-form" id="order-form">...</div>

    <div class="share-btn" onclick="shareSite()">
        <i class="fas fa-share-alt"></i>
    </div>

    <script>
        const products = [
            {id:1, emoji:"🦞", name:"Раки у класичному бульйоні", desc:"Ароматний бульйон із великою кількістю кропу, часнику та запашних спецій.", price:1500},
            {id:2, emoji:"🦞", name:"Раки у вершковому бульйоні", desc:"Ніжний вершковий смак із часником та спеціями, м’який та насичений аромат.", price:1500},
            {id:3, emoji:"🦞", name:"Раки у томатному бульйоні", desc:"Яскравий томатний бульйон із пікантними спеціями та легкою кислинкою.", price:1500},
            {id:4, emoji:"🦞", name:"Раки у Том Ям", desc:"Пряний тайський бульйон із цитрусовими нотами та гостринкою.", price:1500},
            {id:5, emoji:"🦞", name:"Раки у пиві", desc:"Ароматний бульйон на основі світлого пива зі спеціями та кропом.", price:1500},
            {id:6, emoji:"🦞", name:"Раки HOT (гострі)", desc:"Гострий бульйон із пікантними спеціями для справжніх любителів вогняного смаку 🌶", price:1500},
            {id:7, emoji:"🦞", name:"Раки у BBQ бульйоні", desc:"Насичений бульйон із солодко-димними нотами BBQ та ароматними спеціями.", price:1500},
            
            {id:8, emoji:"🦐", name:"Креветки в Том Ям", desc:"Кисло-гострий тайський бульйон із яскравими пряними нотами.", price:850},
            {id:9, emoji:"🦐", name:"Креветки в Том Кха", desc:"Ніжний кокосовий бульйон із м’яким вершковим смаком.", price:810},
            {id:10, emoji:"🦐", name:"Креветки у вершковому бульйоні", desc:"Кремовий бульйон із ніжним та делікатним смаком.", price:800},
            {id:11, emoji:"🦐", name:"Креветки у класичному бульйоні", desc:"Легкий прозорий бульйон, що підкреслює натуральний смак креветок.", price:700},
            {id:12, emoji:"🦐", name:"Креветки у томатному бульйоні", desc:"Насичений томатний бульйон із легкою кислинкою.", price:800},
            {id:13, emoji:"🦐", name:"Креветки у часниково-гострому бульйоні", desc:"Пікантний бульйон із яскравими нотами часнику.", price:750},
            {id:14, emoji:"🦐", name:"Креветки у винному бульйоні", desc:"Ароматний бульйон із витонченими винними нотами.", price:770},
            {id:15, emoji:"🦐", name:"Креветки в апельсиново-імбирному бульйоні", desc:"Цитрусовий бульйон із легкою імбирною пікантністю.", price:750}
        ];

        let cart = [];

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="https://i.imgur.com/mIdZ6.jpg" alt="${product.name}">
                    <div class="product-info">
                        <h3>${product.emoji} ${product.name}</h3>
                        <p style="margin-bottom:15px; font-size:0.98rem;">${product.desc}</p>
                        <div class="price">${product.price} грн / кг</div>
                        
                        <div class="size-select" data-id="${product.id}">
                            <button class="size-btn active" data-size="1">1 кг</button>
                            <button class="size-btn" data-size="0.5">0.5 кг</button>
                            <button class="size-btn" data-size="2">2 кг</button>
                        </div>
                        
                        <button class="add-to-cart" onclick="addToCart(${product.id})">
                            Додати в корзину 🔥
                        </button>
                    </div>
                `;
                grid.appendChild(card);
                
                // Активна кнопка розміру
                card.querySelectorAll('.size-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        card.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    });
                });
            });
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const sizeBtns = document.querySelectorAll(`.size-select[data-id="${id}"] .size-btn`);
            let selectedSize = 1;
            sizeBtns.forEach(btn => {
                if (btn.classList.contains('active')) selectedSize = parseFloat(btn.dataset.size);
            });
            
            const item = {...product, qty: selectedSize};
            cart.push(item);
            updateCartCount();
            showToast(`${product.name} (${selectedSize} кг) додано!`);
        }

        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cart-count').textContent = count.toFixed(1);
        }

        function showToast(text) {
            const toast = document.createElement('div');
            toast.style.cssText = `position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:var(--fire); color:white; padding:16px 32px; border-radius:50px; z-index:99999; font-weight:600; box-shadow:0 15px 40px rgba(230,0,0,0.6);`;
            toast.textContent = text;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2800);
        }

        function shareSite() {
            navigator.clipboard.writeText(location.href).then(() => alert('Посилання скопійовано!'));
        }

        // Ініціалізація
        window.onload = () => {
            renderProducts();
            updateCartCount();
        };
    </script>
</body>
</html>
